[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Force Node 18+ for native fetch
[build.environment]
  NODE_VERSION = "20"

# API Endpoints mapped cleanly to Edge Functions
[[redirects]]
  from = "/api/gemini-chat"
  to = "/.netlify/functions/gemini-chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/polygon-api"
  to = "/.netlify/functions/polygon-api"
  status = 200
  force = true

[[redirects]]
  from = "/api/gemini-news"
  to = "/.netlify/functions/gemini-news"
  status = 200
  force = true

[[redirects]]
  from = "/api/news-sentiment"
  to = "/.netlify/functions/news-sentiment"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Legacy URL compatibility - redirect old .html routes to new Next.js paths
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/home.html"
  to = "/"
  status = 301
  force = true

